<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>A Calculator App</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap' rel='stylesheet'><style>* {margin:0;padding:0;box-sizing:border-box}body {font-family:'Inter', sans-serif;background-color: #0a0a14;color: #e8e4ff}::-webkit-scrollbar {width: 6px}::-webkit-scrollbar-track {background: #111120}::-webkit-scrollbar-thumb {background: #6366f1}button {transition: all 0.2s}button:hover {transform: translateY(-1px)}</style></head><body><div class='calculator' style='max-width: 300px;margin: 40px auto;padding: 20px;background-color: #111120;border: 1px solid rgba(255,255,255,0.06);border-radius: 16px;box-shadow: 0 0 10px rgba(0,0,0,0.2)'><input type='text' id='display' style='width: 100%;height: 40px;margin-bottom: 20px;padding: 10px;background-color: #111120;border: 1px solid rgba(99,102,241,0.2);border-radius: 12px;font-size: 20px;font-weight: 600;color: #e8e4ff' disabled><div class='buttons' style='display: grid;grid-template-columns: repeat(4, 1fr);gap: 10px'><button id='clear' style='background: rgba(99,102,241,0.1);color: #a5b4fc;border: 1px solid rgba(99,102,241,0.25);border-radius: 12px;padding: 12px 24px;font-size: 16px' onclick='clearDisplay()'>C</button><button id='backspace' style='background: rgba(99,102,241,0.1);color: #a5b4fc;border: 1px solid rgba(99,102,241,0.25);border-radius: 12px;padding: 12px 24px;font-size: 16px' onclick='backspace()'>DEL</button><button id='equals' style='background: linear-gradient(135deg, #6366f1, #8b5cf6);color: #fff;border-radius: 12px;padding: 12px 24px;font-size: 16px;font-weight: 600' onclick='calculate()'>=</button><button id='divide' style='background: rgba(99,102,241,0.1);color: #a5b4fc;border: 1px solid rgba(99,102,241,0.25);border-radius: 12px;padding: 12px 24px;font-size: 16px' onclick='appendOperator('/')'>/</button><button id='7' style='background: rgba(99,102,241,0.1);color: #a5b4fc;border: 1px solid rgba(99,102,241,0.25);border-radius: 12px;padding: 12px 24px;font-size: 16px' onclick='appendNumber(7)'>7</button><button id='8' style='background: rgba(99,102,241,0.1);color: #a5b4fc;border: 1px solid rgba(99,102,241,0.25);border-radius: 12px;padding: 12px 24px;font-size: 16px' onclick='appendNumber(8)'>8</button><button id='9' style='background: rgba(99,102,241,0.1);color: #a5b4fc;border: 1px solid rgba(99,102,241,0.25);border-radius: 12px;padding: 12px 24px;font-size: 16px' onclick='appendNumber(9)'>9</button><button id='multiply' style='background: rgba(99,102,241,0.1);color: #a5b4fc;border: 1px solid rgba(99,102,241,0.25);border-radius: 12px;padding: 12px 24px;font-size: 16px' onclick='appendOperator('*')'>*</button><button id='4' style='background: rgba(99,102,241,0.1);color: #a5b4fc;border: 1px solid rgba(99,102,241,0.25);border-radius: 12px;padding: 12px 24px;font-size: 16px' onclick='appendNumber(4)'>4</button><button id='5' style='background: rgba(99,102,241,0.1);color: #a5b4fc;border: 1px solid rgba(99,102,241,0.25);border-radius: 12px;padding: 12px 24px;font-size: 16px' onclick='appendNumber(5)'>5</button><button id='6' style='background: rgba(99,102,241,0.1);color: #a5b4fc;border: 1px solid rgba(99,102,241,0.25);border-radius: 12px;padding: 12px 24px;font-size: 16px' onclick='appendNumber(6)'>6</button><button id='subtract' style='background: rgba(99,102,241,0.1);color: #a5b4fc;border: 1px solid rgba(99,102,241,0.25);border-radius: 12px;padding: 12px 24px;font-size: 16px' onclick='appendOperator('-')'>-</button><button id='1' style='background: rgba(99,102,241,0.1);color: #a5b4fc;border: 1px solid rgba(99,102,241,0.25);border-radius: 12px;padding: 12px 24px;font-size: 16px' onclick='appendNumber(1)'>1</button><button id='2' style='background: rgba(99,102,241,0.1);color: #a5b4fc;border: 1px solid rgba(99,102,241,0.25);border-radius: 12px;padding: 12px 24px;font-size: 16px' onclick='appendNumber(2)'>2</button><button id='3' style='background: rgba(99,102,241,0.1);color: #a5b4fc;border: 1px solid rgba(99,102,241,0.25);border-radius: 12px;padding: 12px 24px;font-size: 16px' onclick='appendNumber(3)'>3</button><button id='add' style='background: rgba(99,102,241,0.1);color: #a5b4fc;border: 1px solid rgba(99,102,241,0.25);border-radius: 12px;padding: 12px 24px;font-size: 16px' onclick='appendOperator('+')'>+</button><button id='0' style='background: rgba(99,102,241,0.1);color: #a5b4fc;border: 1px solid rgba(99,102,241,0.25);border-radius: 12px;padding: 12px 24px;font-size: 16px' onclick='appendNumber(0)'>0</button><button id='decimal' style='background: rgba(99,102,241,0.1);color: #a5b4fc;border: 1px solid rgba(99,102,241,0.25);border-radius: 12px;padding: 12px 24px;font-size: 16px' onclick='appendDecimal()'>.</button></div><p style='font-size: 11px;color: #4b5563;text-align: center;margin-top: 20px'>Built with Tinku AI </p></div><script>let display = document.getElementById('display');let currentNumber = '';let previousNumber = '';let operator = '';function appendNumber(number) {currentNumber += number.toString();display.value = currentNumber;}function appendOperator(op) {previousNumber = currentNumber;currentNumber = '';operator = op;}function appendDecimal() {if (!currentNumber.includes('.')) {currentNumber += '.';display.value = currentNumber;}}function clearDisplay() {currentNumber = '';previousNumber = '';operator = '';display.value = '';}function backspace() {currentNumber = currentNumber.slice(0, -1);display.value = currentNumber;}function calculate() {let result;switch (operator) {case '+':result = parseFloat(previousNumber) + parseFloat(currentNumber);break;case '-':result = parseFloat(previousNumber) - parseFloat(currentNumber);break;case '*':result = parseFloat(previousNumber) * parseFloat(currentNumber);break;case '/':result = parseFloat(previousNumber) / parseFloat(currentNumber);break;default:break;}display.value = result.toString();currentNumber = result.toString();previousNumber = '';operator = '';}</script></body></html>
